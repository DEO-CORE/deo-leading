services:
  backend:
    build: ./bec
    container_name: deo-backend
    ports:
      - "8000:8000"
    volumes:
      - ./bec:/app
    environment:
      - DEBUG=1
    command: >
      sh -c "python manage.py migrate &&
             python manage.py runserver 0.0.0.0:8000"

  frontend:
    build: ./front
    container_name: deo-frontend
    ports:
      - "5173:5173"
    volumes:
      - ./front:/app
      - /app/node_modules
    environment:
      - VITE_API_URL=http://localhost:8000
    depends_on:
      - backend
